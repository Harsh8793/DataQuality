services:
  backend:
    build: ./backend
    container_name: datapilot-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/datapilot.db
    env_file:
      - ./backend/.env
    volumes:
      - datapilot-data:/app/data

  frontend:
    build: ./frontend
    container_name: datapilot-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  datapilot-data:
